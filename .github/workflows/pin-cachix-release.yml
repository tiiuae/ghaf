name: eval
on:
  push:
    branches:
      - main
  # FIXME: Add on-tag event as well

permissions:
  contents: read

jobs:
  cachix-pin-release:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      matrix:
        include:
          - target: lenovo-x1-carbon-gen11-debug
          - target: lenovo-x1-carbon-gen11-release
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ec9f2d5744a09debf3a187a3f4f675c53b671911 # v2.13.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.pull_request.merge.sha || github.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Install nix
        uses: cachix/install-nix-action@fc6e360bedc9ee72d75e701397f0bb30dce77568 # v31
      - name: Build and pin release for ${{ matrix.target }} 
        # FIXME:`wip` vs `ghaf` if it tagged release 
        run: |
          nix develop --command .github/pin-cachix-repo.sh wip ${{ matrix.target }}
        env:
          CACHIX_REPO: ghaf-dev 
