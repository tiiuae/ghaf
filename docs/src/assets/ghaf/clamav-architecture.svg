<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 540">
  <style>
    .container { fill: none; stroke: #808080; stroke-width: 2; stroke-dasharray: 8,4; }
    .host-bg { fill: #f5f5f5; }
    .vm-bg { fill: #fafafa; }
    .component { fill: #006B54; stroke: #004D3D; stroke-width: 1; }
    .component-highlight { fill: #006B54; stroke: #B85450; stroke-width: 2; }
    .component-secondary { fill: #666666; stroke: #4D4D4D; stroke-width: 1; }
    .text-light { fill: #FFFFFF; font-family: system-ui, sans-serif; font-size: 12px; text-anchor: middle; }
    .text-dark { fill: #333333; font-family: system-ui, sans-serif; font-size: 12px; text-anchor: middle; }
    .text-label { fill: #666666; font-family: system-ui, sans-serif; font-size: 11px; text-anchor: middle; font-style: italic; }
    .text-title { fill: #333333; font-family: system-ui, sans-serif; font-size: 14px; font-weight: bold; }
    .arrow { fill: none; stroke: #006B54; stroke-width: 2; marker-end: url(#arrowhead); }
    .arrow-small { fill: none; stroke: #006B54; stroke-width: 1.5; marker-end: url(#arrowhead-small); }
    .arrow-vsock { fill: none; stroke: #B85450; stroke-width: 2; marker-end: url(#arrowhead-red); }
    .line { stroke: #006B54; stroke-width: 1.5; }
    .line-vsock { stroke: #B85450; stroke-width: 2; }
    @media (prefers-color-scheme: dark) {
      .host-bg { fill: #2D2D2D; }
      .vm-bg { fill: #383838; }
      .text-dark { fill: #E8E8E8; }
      .text-label { fill: #AAAAAA; }
      .text-title { fill: #E8E8E8; }
      .container { stroke: #666666; }
    }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#006B54"/>
    </marker>
    <marker id="arrowhead-small" markerWidth="6" markerHeight="5" refX="5" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#006B54"/>
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#B85450"/>
    </marker>
  </defs>

  <!-- Host Container -->
  <rect x="20" y="20" width="680" height="230" rx="8" class="container host-bg"/>
  <text x="50" y="45" class="text-title">Host</text>

  <!-- Database Updaters - stacked, top left -->
  <rect x="85" y="60" width="90" height="30" rx="4" class="component-secondary"/>
  <text x="130" y="80" class="text-light">freshclam</text>

  <rect x="85" y="95" width="90" height="30" rx="4" class="component-secondary"/>
  <text x="130" y="115" class="text-light">fangfrisch</text>

  <!-- clamd - center, above on-* boxes -->
  <rect x="270" y="70" width="120" height="45" rx="4" class="component-highlight"/>
  <text x="330" y="98" class="text-light">clamd</text>

  <!-- Arrow from updaters to clamd -->
  <line x1="175" y1="92" x2="268" y2="92" class="arrow-small"/>

  <!-- clamd-vproxy - centered above vsock VMs -->
  <rect x="480" y="70" width="120" height="45" rx="4" class="component"/>
  <text x="540" y="98" class="text-light">clamd-vproxy</text>
  <text x="540" y="135" class="text-label">vsock :3400</text>

  <!-- Arrow from clamd to vproxy -->
  <line x1="390" y1="92" x2="478" y2="92" class="arrow-small"/>

  <!-- Host scan services - centered below clamd -->
  <rect x="175" y="190" width="90" height="35" rx="4" class="component-highlight"/>
  <text x="220" y="212" class="text-light">on-access</text>

  <rect x="285" y="190" width="90" height="35" rx="4" class="component"/>
  <text x="330" y="212" class="text-light">on-modify</text>

  <rect x="395" y="190" width="90" height="35" rx="4" class="component"/>
  <text x="440" y="212" class="text-light">on-schedule</text>

  <!-- Lines from clamd to scan services -->
  <line x1="330" y1="115" x2="330" y2="175" class="line"/>
  <line x1="220" y1="175" x2="440" y2="175" class="line"/>
  <line x1="220" y1="175" x2="220" y2="188" class="arrow-small"/>
  <line x1="330" y1="175" x2="330" y2="188" class="arrow-small"/>
  <line x1="440" y1="175" x2="440" y2="188" class="arrow-small"/>

  <!-- VMs Container -->
  <rect x="20" y="290" width="680" height="230" rx="8" class="container vm-bg"/>
  <text x="50" y="315" class="text-title">Virtual Machines</text>

  <!-- VM 1 - local daemon with on-access -->
  <rect x="40" y="340" width="165" height="165" rx="6" class="container"/>
  <text x="122" y="365" class="text-dark">VM (local)</text>

  <rect x="55" y="380" width="65" height="30" rx="4" class="component-secondary"/>
  <text x="87" y="400" class="text-light" font-size="10">freshclam</text>

  <rect x="125" y="380" width="65" height="30" rx="4" class="component"/>
  <text x="157" y="400" class="text-light" font-size="10">clamd</text>

  <rect x="55" y="420" width="135" height="30" rx="4" class="component-highlight"/>
  <text x="122" y="440" class="text-light" font-size="11">on-access</text>

  <rect x="55" y="460" width="135" height="30" rx="4" class="component"/>
  <text x="122" y="480" class="text-light" font-size="11">on-modify</text>

  <!-- VM 2 - local daemon with on-schedule -->
  <rect x="225" y="340" width="165" height="165" rx="6" class="container"/>
  <text x="307" y="365" class="text-dark">VM (local)</text>

  <rect x="240" y="380" width="65" height="30" rx="4" class="component-secondary"/>
  <text x="272" y="400" class="text-light" font-size="10">freshclam</text>

  <rect x="310" y="380" width="65" height="30" rx="4" class="component"/>
  <text x="342" y="400" class="text-light" font-size="10">clamd</text>

  <rect x="240" y="420" width="135" height="30" rx="4" class="component"/>
  <text x="307" y="440" class="text-light" font-size="11">on-schedule</text>

  <rect x="240" y="460" width="135" height="30" rx="4" class="component"/>
  <text x="307" y="480" class="text-light" font-size="11">on-modify</text>

  <!-- VM 3 - vsock -->
  <rect x="410" y="340" width="120" height="100" rx="6" class="container"/>
  <text x="470" y="365" class="text-dark">VM</text>
  <rect x="420" y="380" width="100" height="35" rx="4" class="component"/>
  <text x="470" y="402" class="text-light">on-modify</text>
  <text x="470" y="455" class="text-label">(vsock)</text>

  <!-- VM 4 - vsock -->
  <rect x="550" y="340" width="120" height="100" rx="6" class="container"/>
  <text x="610" y="365" class="text-dark">VM</text>
  <rect x="560" y="380" width="100" height="35" rx="4" class="component"/>
  <text x="610" y="402" class="text-light">on-modify</text>
  <text x="610" y="455" class="text-label">(vsock)</text>

  <!-- Straight vsock connections -->
  <line x1="540" y1="115" x2="540" y2="270" class="line-vsock"/>
  <line x1="470" y1="270" x2="610" y2="270" class="line-vsock"/>
  <line x1="470" y1="270" x2="470" y2="338" class="arrow-vsock"/>
  <line x1="610" y1="270" x2="610" y2="338" class="arrow-vsock"/>

</svg>
